<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>內容管理 | 職場風土學</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/easymde@2.18.0/dist/easymde.min.css" />
  <script src="https://unpkg.com/easymde@2.18.0/dist/easymde.min.js"></script>
  <style>
    .EasyMDEContainer { width: 100%; }
    .EasyMDEContainer .CodeMirror { min-height: 400px; font-size: 15px; line-height: 1.8; }
    .EasyMDEContainer .editor-preview { font-family: 'Noto Sans TC', sans-serif; line-height: 1.8; padding: 1rem; }
    .EasyMDEContainer .editor-preview h1,
    .EasyMDEContainer .editor-preview h2,
    .EasyMDEContainer .editor-preview h3 { font-family: 'Noto Serif TC', serif; }
    .EasyMDEContainer .editor-toolbar { flex-wrap: wrap; }
  </style>
</head>
<body>
  <script>
    (function() {
      var hash = window.location.hash;
      var hasToken = hash && (
        hash.includes("recovery_token") ||
        hash.includes("invite_token") ||
        hash.includes("confirmation_token")
      );
      if (hasToken && window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function() {
          window.netlifyIdentity.open();
        });
      }
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function() {
      var CMS = window.CMS;
      var createClass = window.createClass;
      var h = window.h;

      var EasyMDEControl = createClass({
        getInitialState: function() {
          return { id: 'easymde-' + Math.random().toString(36).slice(2) };
        },

        componentDidMount: function() {
          var self = this;
          var el = document.getElementById(this.state.id);
          if (!el || !window.EasyMDE) return;

          this.mde = new EasyMDE({
            element: el,
            initialValue: this.props.value || '',
            spellChecker: false,
            autofocus: true,
            sideBySideFullscreen: false,
            status: false,
            toolbar: [
              {
                name: 'bold',
                action: EasyMDE.toggleBold,
                className: 'fa fa-bold',
                title: '粗體'
              },
              {
                name: 'italic',
                action: EasyMDE.toggleItalic,
                className: 'fa fa-italic',
                title: '斜體'
              },
              '|',
              {
                name: 'heading-2',
                action: function(editor) {
                  var cm = editor.codemirror;
                  var cursor = cm.getCursor();
                  var line = cm.getLine(cursor.line);
                  var cleaned = line.replace(/^#{1,6}\s*/, '');
                  cm.replaceRange('## ' + cleaned, { line: cursor.line, ch: 0 }, { line: cursor.line, ch: line.length });
                },
                className: 'fa fa-header',
                title: '標題 H2'
              },
              {
                name: 'heading-3',
                action: function(editor) {
                  var cm = editor.codemirror;
                  var cursor = cm.getCursor();
                  var line = cm.getLine(cursor.line);
                  var cleaned = line.replace(/^#{1,6}\s*/, '');
                  cm.replaceRange('### ' + cleaned, { line: cursor.line, ch: 0 }, { line: cursor.line, ch: line.length });
                },
                className: 'fa fa-header fa-header-x fa-header-3',
                title: '標題 H3'
              },
              '|',
              {
                name: 'quote',
                action: EasyMDE.toggleBlockquote,
                className: 'fa fa-quote-left',
                title: '引用'
              },
              {
                name: 'ordered-list',
                action: EasyMDE.toggleOrderedList,
                className: 'fa fa-list-ol',
                title: '有序清單'
              },
              {
                name: 'unordered-list',
                action: EasyMDE.toggleUnorderedList,
                className: 'fa fa-list-ul',
                title: '無序清單'
              },
              '|',
              {
                name: 'text-color',
                action: function(editor) {
                  var cm = editor.codemirror;
                  var selected = cm.getSelection();
                  var text = selected || '文字內容';
                  cm.replaceSelection('<span style="color: #722F37">' + text + '</span>');
                },
                className: 'fa fa-paint-brush',
                title: '文字顏色'
              },
              {
                name: 'color-block',
                action: function(editor) {
                  var cm = editor.codemirror;
                  var selected = cm.getSelection();
                  var text = selected || '區塊內容';
                  cm.replaceSelection('\n<div style="background: #FAF6F1; padding: 1rem; border-radius: 4px; margin: 1rem 0;">\n\n' + text + '\n\n</div>\n');
                },
                className: 'fa fa-square',
                title: '顏色區塊'
              },
              '|',
              {
                name: 'side-by-side',
                action: EasyMDE.toggleSideBySide,
                className: 'fa fa-columns',
                title: '左右分割預覽'
              },
              {
                name: 'preview',
                action: EasyMDE.togglePreview,
                className: 'fa fa-eye',
                title: '預覽'
              }
            ]
          });

          // Auto-enable side-by-side on load
          setTimeout(function() {
            if (self.mde && !self.mde.isSideBySideActive()) {
              EasyMDE.toggleSideBySide(self.mde);
            }
          }, 100);

          this.mde.codemirror.on('change', function() {
            self.props.onChange(self.mde.value());
          });
        },

        componentWillUnmount: function() {
          if (this.mde) {
            this.mde.toTextArea();
            this.mde = null;
          }
        },

        render: function() {
          return h('textarea', { id: this.state.id });
        }
      });

      var EasyMDEPreview = createClass({
        render: function() {
          return h('div', {
            dangerouslySetInnerHTML: { __html: this.props.value || '' }
          });
        }
      });

      CMS.registerWidget('markdown', EasyMDEControl, EasyMDEPreview);
    })();
  </script>
</body>
</html>
