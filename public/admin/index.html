<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>內容管理 | 職場風土學</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/easymde@2.18.0/dist/easymde.min.css" />
  <script src="https://unpkg.com/easymde@2.18.0/dist/easymde.min.js"></script>
  <style>
    /* === 加寬 Decap CMS 編輯面板 === */
    /* Decap 預設把編輯區限制在約 800px 的卡片內，這裡強制填滿可用寬度 */
    #nc-root [class*="CollectionTopContainer"],
    #nc-root [class*="EditorToolbar"] ~ div,
    #nc-root [class*="EntryContainer"],
    #nc-root [class*="ControlPaneContainer"],
    #nc-root [class*="PreviewPaneContainer"] {
      max-width: none !important;
    }
    #nc-root [class*="ControlPaneContainer"] {
      padding-left: 2rem !important;
      padding-right: 2rem !important;
    }
    /* 把整張表單卡片的 max-width 打掉 */
    #nc-root form[class*="EntryForm"],
    #nc-root div[class*="StyledCard"],
    #nc-root div[class*="ControlPane"] > div {
      max-width: none !important;
      width: 100% !important;
    }

    /* === EasyMDE 編輯器外觀 === */
    .EasyMDEContainer { width: 100%; }
    /* 編輯區高度填滿可視範圍，大幅減少上下捲動 */
    .EasyMDEContainer .CodeMirror {
      min-height: calc(100vh - 260px);
      font-size: 15px;
      line-height: 2.0;
    }
    .EasyMDEContainer .editor-preview,
    .EasyMDEContainer .editor-preview-side {
      font-family: 'Noto Sans TC', sans-serif;
      line-height: 2.0;
      padding: 1rem;
    }
    .EasyMDEContainer .editor-preview h1,
    .EasyMDEContainer .editor-preview h2,
    .EasyMDEContainer .editor-preview h3,
    .EasyMDEContainer .editor-preview-side h1,
    .EasyMDEContainer .editor-preview-side h2,
    .EasyMDEContainer .editor-preview-side h3 {
      font-family: 'Noto Serif TC', serif;
    }

    /* === Toolbar 固定在編輯區頂端，捲動時跟隨 === */
    .EasyMDEContainer .editor-toolbar {
      position: sticky;
      top: 0;
      background: #ffffff;
      z-index: 10;
      flex-wrap: wrap;
    }

    /* Custom button labels */
    .editor-toolbar button.btn-text-color { font-size: 0; width: auto; min-width: 30px; }
    .editor-toolbar button.btn-text-color::after { content: 'A'; font-size: 16px; font-weight: bold; color: #722F37; }
    .editor-toolbar button.btn-color-block { font-size: 0; width: auto; min-width: 30px; }
    .editor-toolbar button.btn-color-block::after { content: '■'; font-size: 16px; color: #722F37; }
  </style>
</head>
<body>
  <script>
    (function() {
      var hash = window.location.hash;
      var hasToken = hash && (
        hash.includes("recovery_token") ||
        hash.includes("invite_token") ||
        hash.includes("confirmation_token")
      );
      if (hasToken && window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function() {
          window.netlifyIdentity.open();
        });
      }
    })();
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function() {
      var CMS = window.CMS;
      var createClass = window.createClass;
      var h = window.h;

      var EasyMDEControl = createClass({
        getInitialState: function() {
          return { id: 'easymde-' + Math.random().toString(36).slice(2) };
        },

        componentDidMount: function() {
          var self = this;
          var el = document.getElementById(this.state.id);
          if (!el || !window.EasyMDE) return;

          this.mde = new EasyMDE({
            element: el,
            initialValue: this.props.value || '',
            spellChecker: false,
            // 移除 autofocus 避免與 Decap CMS 掛載流程產生 race condition
            // （autofocus 會在元件尚未完全就緒時搶焦點，造成首次按 Enter 失效）
            autofocus: false,
            sideBySideFullscreen: false,
            status: false,
            renderingConfig: {
              singleLineBreaks: true
            },
            toolbar: [
              'bold', 'italic',
              '|',
              'heading-2', 'heading-3',
              '|',
              'quote', 'ordered-list', 'unordered-list',
              '|',
              {
                name: 'text-color',
                action: function(editor) {
                  var cm = editor.codemirror;
                  var selected = cm.getSelection();
                  var text = selected || '文字內容';
                  cm.replaceSelection('<span style="color: #722F37">' + text + '</span>');
                  cm.focus();
                },
                className: 'btn-text-color',
                title: '文字顏色'
              },
              {
                name: 'color-block',
                action: function(editor) {
                  var cm = editor.codemirror;
                  var selected = cm.getSelection();
                  var text = selected || '區塊內容';
                  cm.replaceSelection('\n<div style="background: #FAF6F1; padding: 1rem; border-radius: 4px; margin: 1rem 0;">\n\n' + text + '\n\n</div>\n');
                  cm.focus();
                },
                className: 'btn-color-block',
                title: '顏色區塊'
              },
              '|',
              'side-by-side', 'preview'
            ]
          });

          // 移除自動開啟 side-by-side 的 setTimeout
          // 原因：此行為會在 CodeMirror 掛載後 200ms 切換 DOM 結構，造成鍵盤事件（尤其 Enter）偶發失效
          // 需要即時預覽時，請手動點擊 toolbar 右側的 side-by-side 按鈕

          this.mde.codemirror.on('change', function() {
            self.props.onChange(self.mde.value());
          });
        },

        componentWillUnmount: function() {
          if (this.mde) {
            this.mde.toTextArea();
            this.mde = null;
          }
        },

        render: function() {
          return h('textarea', { id: this.state.id });
        }
      });

      var EasyMDEPreview = createClass({
        render: function() {
          return h('div', {
            dangerouslySetInnerHTML: { __html: this.props.value || '' }
          });
        }
      });

      CMS.registerWidget('markdown', EasyMDEControl, EasyMDEPreview);
    })();
  </script>
</body>
</html>
